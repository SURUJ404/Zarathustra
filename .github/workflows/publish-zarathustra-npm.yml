name: Publish zarathustra-js to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
    tag:
      description: 'npm tag (e.g. latest, next)'
      required: true
      default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zarathustra/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish --access public --tag ${{ github.event.inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
