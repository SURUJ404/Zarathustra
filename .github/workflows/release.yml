name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zarathustra-x86_64-unknown-linux-gnu.tgz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: zarathustra-aarch64-apple-darwin.tgz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: git lfs pull
      - uses: ./.github/actions/rustup
        with:
          targets: ${{ matrix.target }}
      - name: Build release binaries
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
          mkdir -p tmp/pkg
          cp target/${{ matrix.target }}/release/zarathustra tmp/pkg/
      - name: Package artifacts
        run: |
          cd tmp/pkg
          tar cv * | gzip -9 > ../../${{ matrix.artifact }}
      - uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.artifact }}

  release-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zarathustra:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zarathustra:${{ github.ref_name }}
