name: website

on:
  push:
    branches: [main]
    paths:
      - 'zarathustra/web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy to Vercel
        id: vercel
        run: |
          npx --yes vercel@latest deploy --prod \
            --token="${{ secrets.ZARATOKEN }}" \
            --scope=${{ secrets.ORGID }} \
            --cwd=zarathustra/web \
            --yes --force 2>&1 | tee zarathustra/web/deploy-log.txt
          echo "deploy_output=$(cat zarathustra/web/deploy-log.txt)" >> $GITHUB_OUTPUT
