name: Deploy Zarathustra Web IDE to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'zarathustra/web/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zarathustra/web
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' \
            "${{ secrets.VERCELID }}" \
            "${{ secrets.PROJECTID }}" \
            > .vercel/project.json
          npx vercel@latest deploy --prod --token "${{ secrets.ZEROTOKEN }}" --yes
