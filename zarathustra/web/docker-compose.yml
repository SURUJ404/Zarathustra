services:
  zarathustra:
    build:
      context: ../..
      dockerfile: zarathustra/web/Dockerfile
    container_name: zarathustra
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - WORK_DIR=/app/work
      - LOG_LEVEL=info
    volumes:
      - zarathustra-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

volumes:
  zarathustra-data:
